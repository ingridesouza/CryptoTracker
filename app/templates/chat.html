<!-- Chat Side Panel — fragmento incluído em base.html -->
<style>
/* ── Backdrop ──────────────────────────────────── */
#chat-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(2px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 300;
}
#chat-backdrop.visible {
  opacity: 1;
  pointer-events: all;
}

/* ── Painel lateral ────────────────────────────── */
#chat-panel {
  position: fixed;
  top: 0;
  right: 0;
  height: 100vh;
  width: 440px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  box-shadow: -8px 0 40px rgba(0, 0, 0, 0.5);
  display: flex;
  flex-direction: column;
  z-index: 310;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}
#chat-panel.open {
  transform: translateX(0);
}
@media (max-width: 500px) {
  #chat-panel { width: 100vw; border-left: none; }
}

/* ── Header ────────────────────────────────────── */
#panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-header-left { display: flex; align-items: center; gap: 12px; }
.panel-avatar {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #fff;
  flex-shrink: 0;
}
.panel-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.panel-status { font-size: 11px; color: var(--accent-green); margin-top: 1px; }
.panel-header-right { display: flex; align-items: center; gap: 6px; }
.panel-btn {
  width: 30px; height: 30px;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  transition: color 0.15s, background 0.15s;
}
.panel-btn:hover { color: var(--text-primary); background: var(--bg-hover); }

/* ── Context strip ─────────────────────────────── */
#ctx-strip {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
#ctx-strip::-webkit-scrollbar { display: none; }
.ctx-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
  flex-shrink: 0;
}
.ctx-badge .val { color: var(--text-primary); font-weight: 600; }
.ctx-badge .up  { color: var(--accent-green); }
.ctx-badge .down{ color: var(--accent-red); }

/* ── Mensagens ─────────────────────────────────── */
#panel-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 0;
}
#panel-messages::-webkit-scrollbar { width: 4px; }
#panel-messages::-webkit-scrollbar-track { background: transparent; }
#panel-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg-avatar.bot {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  color: #fff;
}
.msg-avatar.user {
  background: var(--bg-hover);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.message {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.6;
  word-break: break-word;
}
.bot-message {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-top-left-radius: 4px;
}
.user-message {
  background: var(--accent-blue);
  color: #fff;
  border-top-right-radius: 4px;
}

/* Cursor durante streaming */
.stream-cur {
  display: inline;
  color: var(--accent-blue);
  animation: blink 0.75s step-end infinite;
  margin-left: 1px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Markdown (marked.js) */
.bot-message p { margin: 0 0 8px; }
.bot-message p:last-child { margin-bottom: 0; }
.bot-message strong { color: var(--text-primary); font-weight: 700; }
.bot-message em { color: var(--text-secondary); }
.bot-message h1,.bot-message h2,.bot-message h3,.bot-message h4 {
  font-size: 13px; font-weight: 700; color: var(--accent-blue); margin: 10px 0 5px;
}
.bot-message code {
  background: var(--bg-primary); padding: 1px 6px; border-radius: 4px;
  font-family: var(--font-mono); font-size: 11.5px; color: var(--accent-blue);
}
.bot-message pre {
  background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0;
}
.bot-message pre code { background: none; padding: 0; color: var(--text-primary); font-size: 12px; }
.bot-message ul,.bot-message ol { padding-left: 18px; margin: 4px 0 8px; }
.bot-message li { margin-bottom: 4px; line-height: 1.55; }
.bot-message hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.bot-message table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; }
.bot-message th,.bot-message td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
.bot-message th { background: var(--bg-primary); color: var(--text-secondary); font-weight: 600; }
.bot-message blockquote {
  border-left: 3px solid var(--accent-blue); margin: 8px 0;
  padding: 4px 12px; color: var(--text-secondary); font-style: italic;
}

/* Loader dots */
#panel-loader {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
}
#panel-loader.visible { display: flex; }
.dot {
  width: 7px; height: 7px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: dot-bounce 1.2s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce {
  0%,80%,100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* ── Quick chips ───────────────────────────────── */
#quick-chips {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
  border-top: 1px solid var(--border);
}
#quick-chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 5px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  font-size: 11.5px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.chip:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  background: rgba(88,166,255,0.08);
}

/* ── Input ─────────────────────────────────────── */
#panel-input-area {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}
#user-input {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 13.5px;
  color: var(--text-primary);
  outline: none;
  resize: none;
  max-height: 120px;
  min-height: 42px;
  line-height: 1.5;
  font-family: var(--font-sans);
  transition: border-color 0.15s;
  overflow-y: auto;
}
#user-input:focus { border-color: var(--accent-blue); }
#send-btn {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--accent-blue);
  color: #fff;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.15s;
  border: none;
}
#send-btn:hover { background: #4090e0; transform: scale(1.05); }
#send-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }

/* ── FAB toggle ────────────────────────────────── */
#chat-fab {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent-blue);
  color: #fff;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 320;
  box-shadow: 0 4px 20px rgba(88,166,255,0.4);
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  border: none;
}
#chat-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(88,166,255,0.55); }
#chat-fab.active { display: none; }
</style>

<!-- Backdrop -->
