{% extends 'base.html' %}
{% block title %}Buscar — CryptoTracker{% endblock %}

{% block extra_css %}
<style>
.search-page-form { display: flex; gap: 10px; margin-bottom: 24px; }
.search-page-input { flex: 1; padding: 12px 16px; font-size: 15px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text-primary); }
.search-page-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(88,166,255,0.12); outline: none; }
.search-result-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; display: flex; gap: 20px; align-items: flex-start; transition: border-color var(--transition), box-shadow var(--transition); cursor: pointer; }
.search-result-card:hover { border-color: var(--border-glow); box-shadow: var(--glow-blue); }
.search-result-logo { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; }
.search-result-body { flex: 1; min-width: 0; }
.search-result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.search-result-name { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
.search-result-sym { font-family: var(--font-mono); font-size: 14px; color: var(--text-secondary); text-transform: uppercase; }
.search-result-rank { background: var(--bg-hover); border: 1px solid var(--border); border-radius: var(--radius-full); padding: 2px 10px; font-size: 12px; color: var(--text-muted); }
.search-result-price { font-size: 28px; font-weight: 800; font-family: var(--font-mono); margin-bottom: 4px; }
.search-result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
@media (max-width: 600px) { .search-result-stats { grid-template-columns: 1fr 1fr; } .search-result-card { flex-direction: column; } }
.search-stat { background: var(--bg-primary); border-radius: var(--radius-sm); padding: 10px 14px; }
.search-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 4px; }
.search-stat-value { font-size: 14px; font-weight: 600; font-family: var(--font-mono); }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Buscar Criptomoeda</h1>
  <p class="page-subtitle">Digite o nome ou símbolo para ver detalhes</p>
</div>

<form class="search-page-form" id="search-form">
  <input type="text" id="search-input" class="search-page-input" placeholder="Ex: bitcoin, ethereum, BTC..." autocomplete="off">
  <button type="submit" class="btn btn-primary" style="padding:12px 20px;font-size:14px">
    <i class="fa-solid fa-magnifying-glass"></i> Buscar
  </button>
</form>

<div id="search-result-area"></div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
{% endblock %}
