{% extends 'base.html' %}
{% block title %}Buscar — CryptoTracker{% endblock %}

{% block extra_css %}
<style>
.search-page-form { display: flex; gap: 10px; margin-bottom: 24px; }
.search-page-input {
  flex: 1; padding: 11px 16px; font-size: 14px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-md); color: var(--text-primary);
  font-family: inherit;
}
.search-page-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
  outline: none;
}
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Buscar</h1>
</div>

<form class="search-page-form" id="search-form">
  <input type="text" id="search-input" class="search-page-input"
         placeholder="Nome, símbolo ou ID — ex: Bitcoin, BTC, ETH, Solana…"
         autocomplete="off" autofocus>
  <button type="submit" class="btn btn-primary" style="padding:11px 20px">
    <i class="fa-solid fa-magnifying-glass"></i> Buscar
  </button>
</form>

<div id="search-result-area"></div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
{% endblock %}
