<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CryptoTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
  <style>
    body {
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(88,166,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,166,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .auth-wrap {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo-icon { font-size: 28px; color: var(--accent-blue); display: block; margin-bottom: 8px; }
    .auth-logo-text { font-size: 20px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em; }
    .auth-logo-text span { color: var(--accent-blue); }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow: var(--shadow);
    }
    .auth-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
    .auth-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 12px; pointer-events: none;
    }
    .form-input {
      width: 100%;
      padding: 10px 12px 10px 32px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
    }
    .btn-auth {
      width: 100%;
      padding: 11px;
      background: var(--accent-blue);
      color: #0d1117;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: filter .15s;
      margin-top: 6px;
      font-family: inherit;
    }
    .btn-auth:hover { filter: brightness(1.1); }
    .auth-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .auth-footer a { color: var(--accent-blue); font-weight: 600; }
    .flash { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }
    .flash-error   { background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.3); color: var(--accent-red); }
    .flash-success { background: rgba(63,185,80,0.12); border: 1px solid rgba(63,185,80,0.3);  color: var(--accent-green); }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <i class="fa-solid fa-chart-line auth-logo-icon"></i>
      <div class="auth-logo-text">Crypto<span>Tracker</span></div>
    </div>

    <div class="auth-card">
      <div class="auth-title">Bem-vindo de volta</div>
      <div class="auth-subtitle">Entre para acessar seu portfolio e alertas</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" name="email" class="form-input" placeholder="seu@email.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn-auth">Entrar</button>
      </form>

      <div class="auth-footer">
        Não tem conta? <a href="{{ url_for('auth.register') }}">Criar conta</a>
      </div>
    </div>
  </div>
</body>
</html>
